<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onaissa 🌙</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose:    #ff6b9d;
      --pink:    #ffb3cc;
      --lavender:#c084fc;
      --gold:    #ffd700;
      --glass:   rgba(255,255,255,0.12);
      --blur:    blur(14px);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a0020 0%, #2d0040 40%, #0d0020 100%);
      color: #fff; min-height: 100vh; overflow-x: hidden;
    }
    #stars-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(20,0,30,0.7); backdrop-filter: var(--blur);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px; border-bottom: 1px solid rgba(255,107,157,0.2);
    }
    .nav-logo {
      font-size: 1.4rem; font-weight: 700; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--rose), var(--lavender));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.75); text-decoration: none;
      font-size: 0.9rem; letter-spacing: 1px; transition: color .3s;
    }
    .nav-links a:hover { color: var(--rose); }
    section { position: relative; z-index: 1; }

    /* HERO */
    #hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 20px 60px;
    }
    .hero-glow {
      position: absolute; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,157,0.25) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
    }
    .hero-avatar {
      width: 140px; height: 140px; border-radius: 50%;
      border: 3px solid var(--rose);
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(255,107,157,0.5);
      animation: floatAvatar 4s ease-in-out infinite;
    }
    @keyframes floatAvatar { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    .hero-title {
      font-size: clamp(2.8rem,8vw,5.5rem); font-weight: 800; line-height: 1.1;
      background: linear-gradient(135deg,#fff 0%,var(--pink) 50%,var(--lavender) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px;
    }
    .hero-sub { font-size: 1.2rem; color: rgba(255,255,255,0.65); max-width: 460px; line-height: 1.7; margin-bottom: 36px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 40px; }
    .badge {
      background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid rgba(255,107,157,0.3); border-radius: 999px;
      padding: 8px 20px; font-size: 0.85rem; color: var(--pink);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      color: #fff; border: none; border-radius: 999px;
      padding: 14px 38px; font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 6px 30px rgba(255,107,157,0.4);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none; display: inline-block;
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,107,157,0.6); }

    .floating-heart {
      position: fixed; animation: riseHeart linear infinite;
      pointer-events: none; z-index: 0; opacity: 0;
    }
    @keyframes riseHeart {
      0%   { transform: translateY(100vh) scale(.6); opacity: .7; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }

    .section-title {
      text-align: center; font-size: clamp(1.8rem,4vw,2.8rem);
      font-weight: 800; margin-bottom: 12px;
      background: linear-gradient(90deg,var(--pink),var(--lavender));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-sub { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 52px; font-size: 1rem; }

    /* ABOUT */
    #about { padding: 100px 20px; }
    .about-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 24px; max-width: 900px; margin: 0 auto; }
    .about-card {
      background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid rgba(255,107,157,0.2); border-radius: 20px;
      padding: 32px 28px; text-align: center; transition: transform .3s, border-color .3s;
    }
    .about-card:hover { transform: translateY(-6px); border-color: var(--rose); }
    .about-card .icon { font-size: 2.4rem; margin-bottom: 14px; }
    .about-card h3 { font-size: 1.1rem; color: var(--pink); margin-bottom: 8px; }
    .about-card p  { color: rgba(255,255,255,0.65); font-size: 0.9rem; line-height: 1.6; }

    /* REASONS */
    #reasons { padding: 100px 20px; background: rgba(255,107,157,0.04); }
    .reasons-list { max-width: 700px; margin: 0 auto; counter-reset: reasons; display: flex; flex-direction: column; gap: 20px; }
    .reason-item {
      counter-increment: reasons; background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid rgba(192,132,252,0.25); border-radius: 16px;
      padding: 22px 28px 22px 70px; position: relative; transition: transform .3s;
    }
    .reason-item:hover { transform: translateX(8px); }
    .reason-item::before {
      content: counter(reasons); position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      font-size: 1.5rem; font-weight: 900; color: var(--rose); opacity: .5;
    }
    .reason-item p { color: rgba(255,255,255,.85); line-height: 1.6; }
    .reason-item .r-emoji { font-size: 1.2rem; margin-right: 8px; }

    /* GAMES */
    #games { padding: 100px 20px; background: rgba(100,0,80,0.12); }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap: 28px; max-width: 1000px; margin: 0 auto; }
    .game-card {
      background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid rgba(255,107,157,0.25); border-radius: 24px;
      padding: 32px 28px; text-align: center; transition: transform .3s, border-color .3s;
    }
    .game-card:hover { transform: translateY(-4px); border-color: var(--rose); }
    .game-card h3 { font-size: 1.2rem; color: var(--pink); margin-bottom: 8px; }
    .game-card p  { color: rgba(255,255,255,.55); font-size: .88rem; margin-bottom: 20px; }
    #scramble-word { font-size: 2.2rem; font-weight: 800; letter-spacing: 10px; color: var(--lavender); margin: 12px 0; }
    #scramble-input {
      width: 100%; padding: 10px 16px; border-radius: 10px;
      border: 1.5px solid rgba(255,107,157,.4); background: rgba(0,0,0,.3);
      color: #fff; font-size: 1rem; text-align: center; margin-bottom: 10px; outline: none;
    }
    #scramble-feedback { min-height: 22px; font-size: .9rem; color: var(--gold); }
    #catch-canvas {
      display: block; border-radius: 14px; border: 1px solid rgba(255,107,157,.3);
      margin: 0 auto 10px; background: rgba(0,0,0,.25); cursor: pointer;
    }
    #catch-score-display { color: var(--pink); font-size: .95rem; margin-bottom: 8px; }
    .memory-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: 0 auto 12px; max-width: 280px; }
    .mem-card {
      width: 100%; aspect-ratio: 1; border-radius: 10px;
      background: linear-gradient(135deg,var(--rose),var(--lavender));
      border: none; font-size: 1.4rem; cursor: pointer;
      color: transparent; transition: transform .2s, background .2s;
    }
    .mem-card.flipped,.mem-card.matched { color: #fff; background: rgba(0,0,0,.35); }
    .mem-card.matched { background: linear-gradient(135deg,#2d8a4e,#5cdb95); cursor: default; }
    #mem-status { color: var(--gold); font-size: .88rem; min-height: 20px; }
    #quiz-question { color: #fff; font-size: 1rem; margin-bottom: 16px; line-height: 1.5; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .quiz-opt {
      background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,107,157,.3);
      border-radius: 10px; padding: 10px 16px; color: #fff;
      font-size: .9rem; cursor: pointer; text-align: left; transition: background .2s, border-color .2s;
    }
    .quiz-opt:hover { background: rgba(255,107,157,.2); border-color: var(--rose); }
    .quiz-opt.correct { background: rgba(40,180,90,.3); border-color: #5cdb95; }
    .quiz-opt.wrong   { background: rgba(220,40,40,.3); border-color: #f87171; }
    #quiz-feedback { min-height: 22px; font-size: .9rem; color: var(--gold); }
    #quiz-score { color: var(--pink); font-size: .88rem; }

    /* ENVELOPE */
    #letter { padding: 100px 20px; }
    .envelope-scene { display: flex; flex-direction: column; align-items: center; }
    .envelope {
      position: relative; width: 420px; height: 280px; cursor: pointer;
      transition: transform .3s, filter .3s;
      filter: drop-shadow(0 16px 48px rgba(255,107,157,0.4)); flex-shrink: 0;
    }
    .envelope:not(.opened) { animation: envBob 3.5s ease-in-out infinite; }
    @keyframes envBob { 0%,100%{transform:translateY(0) rotate(-0.8deg)} 50%{transform:translateY(-10px) rotate(0.8deg)} }
    .envelope:hover { filter: drop-shadow(0 24px 60px rgba(255,107,157,0.65)); }
    .envelope.opened { animation: none; cursor: default; }
    .envelope svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    .env-flap-group { transform-origin: 210px 0px; transform-box: fill-box; transition: transform 1s cubic-bezier(0.4,0,0.2,1); }
    .envelope.opened .env-flap-group { transform: rotateX(180deg); }
    .env-seal-group { transition: opacity .35s ease .2s, transform .35s ease .2s; transform-origin: center; transform-box: fill-box; }
    .envelope.opened .env-seal-group { opacity: 0; transform: scale(0.5); }
    .env-hint { margin-top: 20px; font-size: .85rem; color: rgba(255,180,210,0.65); letter-spacing: 2px; animation: hintPulse 2s ease-in-out infinite; }
    @keyframes hintPulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    .env-hint.hidden { display: none; }
    .letter-paper {
      width: 400px; max-width: 90vw;
      background: linear-gradient(158deg, #fdf0ff 0%, #fde8f5 100%);
      border-radius: 4px 4px 10px 10px; padding: 44px 42px 48px;
      position: relative; color: #2a0030;
      max-height: 0; overflow: hidden; opacity: 0;
      transform: translateY(-20px) scaleY(0.92); transform-origin: top center;
      transition: max-height .9s cubic-bezier(0.4,0,0.2,1) .55s, opacity .6s ease .75s, transform .6s ease .75s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .letter-paper::after {
      content: ''; position: absolute; left: 0; right: 0; top: 96px; bottom: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 30px, rgba(200,80,150,0.12) 30px, rgba(200,80,150,0.12) 31px);
      pointer-events: none; border-radius: 0 0 10px 10px;
    }
    .letter-paper::before {
      content: ''; position: absolute; left: 68px; top: 0; bottom: 0;
      width: 1px; background: rgba(255,100,100,0.2); pointer-events: none;
    }
    .letter-paper.visible { max-height: 900px; opacity: 1; transform: translateY(0) scaleY(1); }
    .letter-paper p { font-size: 1rem; line-height: 1.95; color: #2a0030; margin-bottom: 18px; position: relative; z-index: 1; }
    .letter-paper .salutation { font-size: 1.2rem; font-weight: 700; color: #8b005a; margin-bottom: 22px; font-family: Georgia,serif; }
    .letter-paper .signature { font-size: 1.15rem; font-style: italic; color: #cc2266; margin-top: 8px; font-family: Georgia,serif; position: relative; z-index: 1; }
    .letter-paper .heart-deco { text-align: center; font-size: 1.6rem; margin-top: 20px; position: relative; z-index: 1; }
    .paper-crease { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(to bottom, rgba(180,80,130,0.15), transparent); }
    .paper-top-fold { position: absolute; top: -3px; left: 0; right: 0; height: 6px; background: linear-gradient(158deg, #fdf0ff 0%, #fde8f5 100%); border-radius: 2px 2px 0 0; box-shadow: 0 -3px 8px rgba(255,107,157,0.12); }

    /* ══════════════════════════════════════
       INTERACTIVE BOOK
    ══════════════════════════════════════ */
    #timeline { padding: 100px 20px 120px; }

    .book-scene {
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    /* Book container — perspective wrapper */
    .book-wrap {
      perspective: 2000px;
      width: 700px; max-width: 96vw;
      position: relative;
    }

    /* The book itself — two pages side by side */
    .book {
      width: 100%;
      display: flex;
      position: relative;
      transform-style: preserve-3d;
      filter: drop-shadow(0 30px 70px rgba(0,0,0,0.7));
    }

    /* Shared page styles */
    .page-left, .page-right {
      width: 50%;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    /* Left page — always visible, static */
    .page-left {
      background: linear-gradient(160deg, #fdf4ff 0%, #f9e8f8 100%);
      border-radius: 8px 0 0 8px;
      border-right: 1px solid rgba(180,80,150,0.15);
      padding: 40px 32px 40px 40px;
      display: flex; flex-direction: column; justify-content: center;
      box-shadow: inset -6px 0 18px rgba(0,0,0,0.07);
    }

    /* ruled lines on left page */
    .page-left::after {
      content: '';
      position: absolute; left: 0; right: 0; top: 80px; bottom: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 32px, rgba(200,100,180,0.1) 32px, rgba(200,100,180,0.1) 33px);
      pointer-events: none;
    }
    /* red margin on left */
    .page-left::before {
      content: ''; position: absolute;
      left: 52px; top: 0; bottom: 0; width: 1px;
      background: rgba(255,80,100,0.18); pointer-events: none;
    }

    /* Right page — the "flipping" page */
    .page-right {
      background: linear-gradient(160deg, #fef6ff 0%, #faeaf9 100%);
      border-radius: 0 8px 8px 0;
      padding: 40px 40px 40px 32px;
      display: flex; flex-direction: column; justify-content: center;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.85s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }
    /* ruled lines on right page */
    .page-right::after {
      content: '';
      position: absolute; left: 0; right: 0; top: 80px; bottom: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 32px, rgba(200,100,180,0.1) 32px, rgba(200,100,180,0.1) 33px);
      pointer-events: none;
    }

    /* Flipping state */
    .page-right.flipping {
      transform: rotateY(-180deg);
    }

    /* Page content */
    .page-content {
      position: relative; z-index: 2;
    }

    .page-chapter {
      font-size: .72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 14px;
      color: rgba(160,40,120,0.55);
    }
    .page-icon { font-size: 2.8rem; margin-bottom: 14px; display: block; }
    .page-title {
      font-size: 1.25rem; font-weight: 800;
      color: #5a0045; margin-bottom: 14px;
      font-family: Georgia, serif; line-height: 1.3;
    }
    .page-body {
      font-size: .93rem; line-height: 1.85;
      color: #3a002e;
    }

    /* Page number */
    .page-num {
      position: absolute; bottom: 16px;
      font-size: .75rem; color: rgba(160,60,130,0.45);
      font-style: italic; letter-spacing: 1px;
    }
    .page-left .page-num  { right: 20px; }
    .page-right .page-num { left:  20px; }

    /* Book spine shadow */
    .book-spine {
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 18px;
      transform: translateX(-50%);
      background: linear-gradient(to right, rgba(0,0,0,0.18), rgba(255,107,157,0.08), rgba(0,0,0,0.12));
      z-index: 10;
      pointer-events: none;
    }

    /* Book cover — shown before opening */
    .book-cover {
      position: absolute; inset: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #3a0048 0%, #1c0030 60%, #2d0040 100%);
      border: 2px solid rgba(255,107,157,0.35);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; cursor: pointer;
      transition: transform 1.1s cubic-bezier(0.645,0.045,0.355,1), opacity .4s ease;
      transform-origin: left center;
      transform-style: preserve-3d;
      box-shadow: 6px 0 30px rgba(0,0,0,0.5);
    }
    .book-cover.opened {
      transform: rotateY(-180deg);
      pointer-events: none;
    }
    .book-cover::before {
      content: '';
      position: absolute; inset: 10px;
      border: 1px solid rgba(192,132,252,0.2);
      border-radius: 4px; pointer-events: none;
    }
    .cover-title {
      font-size: 1.6rem; font-weight: 800; letter-spacing: 3px;
      background: linear-gradient(135deg, #fff 0%, var(--pink) 60%, var(--lavender) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center; margin-bottom: 10px; line-height: 1.3;
    }
    .cover-subtitle {
      font-size: .8rem; letter-spacing: 4px; color: rgba(255,180,210,0.55);
      text-transform: uppercase; margin-bottom: 28px;
    }
    .cover-icon { font-size: 3.5rem; margin-bottom: 20px; }
    .cover-deco {
      font-size: .75rem; letter-spacing: 2px; color: rgba(192,132,252,0.4);
    }
    /* cover open hint */
    .cover-hint {
      position: absolute; bottom: 24px;
      font-size: .78rem; letter-spacing: 2px;
      color: rgba(255,180,210,0.5);
      animation: hintPulse 2s ease-in-out infinite;
    }

    /* Book controls */
    .book-controls {
      display: flex; align-items: center; gap: 24px;
    }
    .book-btn {
      background: linear-gradient(135deg, var(--rose), var(--lavender));
      border: none; border-radius: 999px;
      width: 52px; height: 52px;
      font-size: 1.3rem; cursor: pointer; color: #fff;
      box-shadow: 0 4px 20px rgba(255,107,157,0.4);
      transition: transform .2s, box-shadow .2s, opacity .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .book-btn:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(255,107,157,0.6); }
    .book-btn:disabled { opacity: .3; cursor: default; transform: none; box-shadow: none; }

    .book-page-indicator {
      font-size: .85rem; color: rgba(255,180,210,0.6);
      letter-spacing: 2px; min-width: 90px; text-align: center;
    }

    /* Page turn shadow overlay */
    .page-shadow {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(to left, rgba(0,0,0,0.15), transparent);
      pointer-events: none; border-radius: 0 8px 8px 0; z-index: 5;
    }

    /* FOOTER */
    footer {
      position: relative; z-index: 1; text-align: center; padding: 50px 20px;
      color: rgba(255,255,255,.3); font-size: .85rem;
      border-top: 1px solid rgba(255,107,157,.1);
    }
    footer span { color: var(--rose); }

    .reveal { opacity: 0; transform: translateY(40px); transition: opacity .7s, transform .7s; }
    .reveal.visible { opacity: 1; transform: none; }

    @media(max-width:700px){
      nav { padding: 12px 20px; } .nav-links { gap: 14px; }
      .envelope { width: 300px; height: 200px; }
      .letter-paper { padding: 32px 22px 36px; }
      .book-wrap { width: 1
